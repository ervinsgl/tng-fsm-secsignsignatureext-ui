# ============================================================
#  DEVOPS REPO FILE — committed, pipeline-owned.
#  This is the official transport descriptor for DEV/QA/PROD.
#  The environment is determined by WHICH subaccount the mtar
#  is deployed into (separate spaces/domains per env), so the
#  app name carries NO -dev/-qa/-prod suffix and the route is
#  auto-generated (default-route: true).
#  Do NOT add a -sandbox name or a pinned route here — that is
#  the local-only manifest.yaml's job and would hijack the route.
# ============================================================

_schema-version: "3.2"
ID: tns.fsm.secsignsignatureext.ui
version: 1.0.0
description: SecSignSignatureExt — FSM PDF document signing extension via SecSign Signature Portal (side-by-side, Node.js/Express + SAPUI5)

parameters:
  enable-parallel-deployments: true

modules:
  - name: tns-fsm-secsignsignatureext-ui
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      command: npm start
      memory: 512M
      disk-quota: 512M
      default-route: true        # CF auto-generates the host per subaccount
    requires:
      - name: fsm-secsignsignatureext-destination
    build-parameters:
      builder: custom
      commands:
        - npm ci --omit=dev
      ignore:
        - ".git/"
        - "docs/"
        - "dist/"
        - "resources/"
        - "mta_archives/"
        - "*.mtaext"

resources:
  # Reuse the EXISTING destination instance (created/configured per subaccount,
  # not managed by this MTA). Same unsuffixed name in every environment.
  - name: fsm-secsignsignatureext-destination
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: fsm-secsignsignatureext-destination